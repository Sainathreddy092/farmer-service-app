<h2>Add Worker</h2>

<form method="post" enctype="multipart/form-data">

    Name: <input type="text" name="name"><br><br>

    Skill:
    <select name="skill">
        <option>ploughing</option>
        <option>harvesting</option>
        <option>spraying</option>
        <option>repair</option>
    </select><br><br>

    Village: <input type="text" name="village"><br><br>

    Phone: <input type="text" name="phone"><br><br>

    Latitude: <input type="text" name="lat"><br><br>
    Longitude: <input type="text" name="lon"><br><br>

    Upload Image: <input type="file" name="image"><br><br>

    <button type="submit">Add Worker</button>
</form>
